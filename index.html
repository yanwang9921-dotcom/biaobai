<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>能成为我的恋人吗？</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #fff9f9;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        .character {
            width: 200px;
            height: auto;
            margin-bottom: 30px;
            transition: opacity 0.3s ease;
        }
        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 40px;
            font-weight: 500;
        }
        .btn-group {
            position: relative;
            width: 100%;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
            white-space: nowrap;
        }
        .agree-btn {
            background-color: #f87171;
            color: white;
            position: relative;
            z-index: 1;
        }
        .refuse-btn {
            background-color: #60a5fa;
            color: white;
            margin-left: 30px;
            position: relative;
            z-index: 999;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .modal-content {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .modal-content h2 {
            font-size: 24px;
            color: #f87171;
            margin-bottom: 20px;
        }
        .modal-content p {
            font-size: 18px;
            color: #333;
            line-height: 1.6;
        }
        .close-btn {
            margin-top: 30px;
            padding: 10px 30px;
            background-color: #f87171;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 1. 这里已经替换成P1的永久OSS链接 -->
        <img src="https://picturer1.oss-cn-beijing.aliyuncs.com/P1.png" alt="表白状态" class="character" id="characterImg">
        <h1>能成为我的恋人吗？</h1>
        <div class="btn-group">
            <button class="btn agree-btn" id="agreeBtn">同意</button>
            <button class="btn refuse-btn" id="refuseBtn">再想想？</button>
        </div>
    </div>

    <div class="modal" id="successModal">
        <div class="modal-content">
            <h2>🥳 太好了！</h2>
            <p>你就是我最想牵手的人<br>往后余生，请多指教啦～</p>
            <button class="close-btn" id="closeModal">确定</button>
        </div>
    </div>

    <script>
        const agreeBtn = document.getElementById('agreeBtn');
        const refuseBtn = document.getElementById('refuseBtn');
        const successModal = document.getElementById('successModal');
        const closeModal = document.getElementById('closeModal');
        const characterImg = document.getElementById('characterImg');

        // 2. 这里已经替换成P1、P2的永久OSS链接
        // 注意：P2的链接请根据你实际的文件名修改（比如P2.png）
        const IMG_P1 = "https://picturer1.oss-cn-beijing.aliyuncs.com/P1.png";
        const IMG_P2 = "https://picturer1.oss-cn-beijing.aliyuncs.com/P2.png";

        // 所有原有按钮逻辑完全保留
        const refuseTexts = ['再想想？', '？你认真的吗', '要不再想想', '不许选这个', '我会很伤心'];
        let clickCount = 0;
        let isFirstClick = true;
        let moveX = 0;
        let moveY = 0;
        let scale = 1;
        let isAgreed = false;

        function growAgree() {
            if(isAgreed) return;
            scale *= 1.2;
            if (isFirstClick) {
                agreeBtn.style.transform = `scale(${scale})`;
            } else {
                agreeBtn.style.transform = `translate(-50%, -50%) scale(${scale})`;
            }
        }

        refuseBtn.addEventListener('click', () => {
            if (clickCount < refuseTexts.length) {
                refuseBtn.innerText = refuseTexts[clickCount];
            }
            clickCount++;

            if (isFirstClick) {
                agreeBtn.style.position = 'absolute';
                agreeBtn.style.left = '50%';
                agreeBtn.style.top = '50%';
                moveY = 40;
                isFirstClick = false;
            }

            growAgree();

            moveX += 30;
            let refuseScale = 1 - (clickCount * 0.15);
            if (refuseScale < 0.1) refuseScale = 0.1;
            refuseBtn.style.transform = `translateX(${moveX}px) translateY(${moveY}px) scale(${refuseScale})`;

            if (moveX > window.innerWidth) {
                refuseBtn.style.display = 'none';
            }
        });

        agreeBtn.addEventListener('click', () => {
            isAgreed = true;
            characterImg.src = IMG_P2;
            successModal.style.display = 'flex';
        });

        closeModal.addEventListener('click', () => {
            successModal.style.display = 'none';
        });
    </script>
</body>
</html>
